<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Запрошення</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..700&family=Inter:wght@400;500;600&display=swap');

  :root{
    --bg: #fdf6f2;
    --ink: #3a2a2c;
    --rose: #c2576b;
    --rose-deep: #9c3b4f;
    --peach: #f3c9b4;
    --line: rgba(58,42,44,0.12);
  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  body{
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  h1,h2{ font-family:'Fraunces', serif; font-weight: 600; letter-spacing: -0.01em; }

  .screen{
    min-height: 100vh;
    display: flex; align-items:center; justify-content:center;
    padding: 32px;
    position: relative;
  }

  /* ---- SCREEN 1: the ask ---- */
  #screen-ask{
    position: relative;
    z-index: 1;
  }
  .ask-card{
    text-align: center;
    max-width: 560px;
    position: relative;
    z-index: 2;
  }
  .eyebrow{
    font-size: 0.78rem; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--rose-deep); margin-bottom: 18px;
  }
  .ask-card h1{
    font-size: clamp(2.2rem, 6vw, 3.6rem);
    line-height: 1.12;
    margin-bottom: 48px;
  }
  .ask-card h1 em{ font-style: italic; color: var(--rose); }

  .button-row{
    display:flex; align-items:center; justify-content:center; gap: 24px;
    position: relative;
    min-height: 120px;
  }

  .btn{
    font-family: 'Inter', sans-serif;
    font-size: 1.05rem; font-weight: 600;
    padding: 16px 38px;
    border-radius: 999px;
    border: none;
    cursor: pointer;
    transition: transform 0.18s ease, box-shadow 0.18s ease;
  }
  .btn-yes{
    background: var(--rose);
    color: #fff8f5;
    box-shadow: 0 10px 24px rgba(194,87,107,0.35);
  }
  .btn-yes:hover{ transform: translateY(-2px) scale(1.03); box-shadow: 0 14px 30px rgba(194,87,107,0.42); }

  .btn-no{
    background: transparent;
    color: var(--rose-deep);
    border: 1.5px solid var(--line);
    position: relative;
    transition: left 0.18s ease, top 0.18s ease, transform 0.18s ease;
  }
  .btn-no.dodging{
    position: fixed;
  }

  .hint{
    margin-top: 28px;
    font-size: 0.85rem;
    opacity: 0.5;
    min-height: 1.2em;
  }

  /* ---- SCREEN 2: the plan ---- */
  #screen-plan{
    display: none;
    opacity: 0;
    transition: opacity 0.5s ease;
  }
  #screen-plan.visible{
    display: flex;
    opacity: 1;
  }

  .plan-card{
    background: #fffaf7;
    border: 1px solid var(--line);
    border-radius: 24px;
    padding: 52px 48px;
    max-width: 480px;
    width: 100%;
    box-shadow: 0 24px 60px rgba(58,42,44,0.08);
  }
  .plan-card .eyebrow{ text-align:left; }
  .plan-card h2{ font-size: clamp(1.7rem, 4vw, 2.2rem); margin-bottom: 12px; }
  .plan-card p.sub{ opacity: 0.65; margin-bottom: 36px; font-size: 0.96rem; }

  .field{ margin-bottom: 24px; }
  .field label{
    display:block; font-size: 0.78rem; text-transform: uppercase;
    letter-spacing: 0.1em; color: var(--rose-deep); margin-bottom: 10px;
  }
  .field input{
    width: 100%;
    padding: 14px 16px;
    border-radius: 10px;
    border: 1.5px solid var(--line);
    background: var(--bg);
    font-family: 'Inter', sans-serif;
    font-size: 1rem;
    color: var(--ink);
    transition: border-color 0.2s;
  }
  .field input:focus{
    outline: none;
    border-color: var(--rose);
  }

  .field-row{ display:flex; gap: 16px; }
  .field-row .field{ flex:1; }

  .field textarea{
    width: 100%;
    padding: 14px 16px;
    border-radius: 10px;
    border: 1.5px solid var(--line);
    background: var(--bg);
    font-family: 'Inter', sans-serif;
    font-size: 1rem;
    color: var(--ink);
    resize: vertical;
    min-height: 90px;
    transition: border-color 0.2s;
  }
  .field textarea:focus{
    outline: none;
    border-color: var(--rose);
  }

  .confirm-btn{
    width: 100%;
    margin-top: 8px;
  }

  #confirmation{
    text-align: center;
    display: none;
  }
  #confirmation.visible{ display:block; }
  #confirmation h2{ font-size: 1.6rem; margin-bottom: 12px; }
  #confirmation p{ opacity: 0.7; }

  :focus-visible{ outline: 2px solid var(--rose); outline-offset: 3px; }

  @media (prefers-reduced-motion: reduce){
    *{ transition: none !important; }
  }

  @media (max-width: 480px){
    .button-row{ flex-direction: column; gap: 18px; }
    .plan-card{ padding: 40px 28px; }
    .field-row{ flex-direction: column; gap: 0; }
  }
</style>
</head>
<body>


<!-- SCREEN 1 -->
<div class="screen" id="screen-ask">
  <div class="ask-card">
    <div class="eyebrow">Особисте запрошення</div>
    <h1>Ти підеш зі мною<br>на <em>каву</em>?</h1>
    <div class="button-row" id="button-row">
      <button class="btn btn-yes" id="btn-yes">Так</button>
      <button class="btn btn-no" id="btn-no">Ні</button>
    </div>
  </div>
</div>

<!-- SCREEN 2 -->
<div class="screen" id="screen-plan">
  <div class="plan-card">
    <div id="plan-form">
      <div class="eyebrow">Чудово!</div>
      <h2>Коли тобі зручно?</h2>
      <p class="sub">Обери дату та час — і я вже буду чекати з посмішкою.</p>
      <div class="field">
        <label for="date-input">Дата</label>
        <input type="date" id="date-input">
      </div>
      <div class="field">
        <label for="time-input">Час</label>
        <input type="time" id="time-input" value="18:00">
      </div>
      <div class="field">
        <label for="message-input">Повідомлення (необовʼязково)</label>
        <textarea id="message-input" placeholder="Напиши щось приємне..."></textarea>
      </div>
      <button class="btn btn-yes confirm-btn" id="btn-confirm">Підтвердити побачення</button>
    </div>
    <div id="confirmation">
      <div class="eyebrow">До зустрічі</div>
      <h2 id="confirm-text"></h2>
    </div>
  </div>
</div>

<script>
  // dodging "no" button
  const btnNo = document.getElementById('btn-no');

  function dodge(){
    if (!btnNo.classList.contains('dodging')){
      const rect = btnNo.getBoundingClientRect();
      btnNo.style.left = rect.left + 'px';
      btnNo.style.top = rect.top + 'px';
      btnNo.classList.add('dodging');
    }

    const btnWidth = btnNo.offsetWidth;
    const btnHeight = btnNo.offsetHeight;
    const margin = 16;
    const maxX = window.innerWidth - btnWidth - margin;
    const maxY = window.innerHeight - btnHeight - margin;

    const newX = Math.max(margin, Math.random() * maxX);
    const newY = Math.max(margin, Math.random() * maxY);

    btnNo.style.left = newX + 'px';
    btnNo.style.top = newY + 'px';
  }

  btnNo.addEventListener('mouseenter', dodge);
  btnNo.addEventListener('click', (e) => { e.preventDefault(); dodge(); });
  btnNo.addEventListener('touchstart', (e) => { e.preventDefault(); dodge(); }, {passive:false});

  // yes -> screen 2
  const screenAsk = document.getElementById('screen-ask');
  const screenPlan = document.getElementById('screen-plan');
  document.getElementById('btn-yes').addEventListener('click', () => {
    screenAsk.style.display = 'none';
    screenPlan.classList.add('visible');
    requestAnimationFrame(() => { screenPlan.style.opacity = '1'; });
  });

  // confirm date/time
  const planForm = document.getElementById('plan-form');
  const confirmation = document.getElementById('confirmation');
  const confirmText = document.getElementById('confirm-text');

  const WEB3FORMS_ACCESS_KEY = '9c08f782-bfe8-401e-b98a-f09d20e90826';

  const confirmBtn = document.getElementById('btn-confirm');

  confirmBtn.addEventListener('click', async () => {
    const dateVal = document.getElementById('date-input').value;
    const timeVal = document.getElementById('time-input').value;
    const messageVal = document.getElementById('message-input').value.trim();

    if (!dateVal){
      document.getElementById('date-input').focus();
      return;
    }

    const dateObj = new Date(dateVal + 'T' + (timeVal || '18:00'));
    const formatted = dateObj.toLocaleDateString('uk-UA', { day: 'numeric', month: 'long' });
    const timeFinal = timeVal || '18:00';

    confirmBtn.disabled = true;
    confirmBtn.textContent = 'Надсилаю...';

    try {
      await fetch('https://api.web3forms.com/submit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          access_key: WEB3FORMS_ACCESS_KEY,
          subject: 'Вона/він сказали ТАК! 💌',
          from_name: 'Запрошення на каву',
          message: `Обрана дата: ${formatted}\nЧас: ${timeFinal}${messageVal ? `\n\nПовідомлення:\n${messageVal}` : ''}`
        })
      });
    } catch (err) {
      console.error('Помилка надсилання:', err);
    }

    confirmText.textContent = `${formatted}, о ${timeFinal}`;
    planForm.style.display = 'none';
    confirmation.classList.add('visible');
  });
</script>

</body>
</html>
